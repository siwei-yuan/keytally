<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QMK Usage Lights</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main>
      <div class="plate">
        <span class="plate-title">USAGE TELEMETRY</span>
        <span class="plate-sub">QMK-LINK // UNIT 01</span>
      </div>
      <div class="stripe"></div>
      <header>
        <span id="conn-dot" class="dot off"></span>
        <span id="conn-text">未连接键盘</span>
      </header>

      <section id="preview" aria-label="键盘灯组预览"></section>
      <div id="led-panel" hidden>
        <span id="led-panel-info"></span>
        <button data-role="1">额度/消耗进度条</button>
        <button data-role="2">数据源指示灯</button>
        <button data-role="0">不参与(保留原灯效)</button>
        <button id="led-clear">取消选择</button>
        <span id="bar-style-row" hidden>
          <span class="sep">|</span> 进度条样式:
          <button data-style="0">数量(亮几颗=百分比)</button>
          <button data-style="1">颜色(全亮,绿→红)</button>
        </span>
      </div>

      <div class="legend">
        <span><i class="chip grad"></i>灯色 = 用量 0→100%</span>
        <span><i class="chip" style="background:#e8641b"></i>活动中 = 亮这个颜色</span>
        <span><i class="chip warn"></i>红闪 = 周限额超阈值</span>
      </div>

      <section class="controls">
        <div class="ctl">
        <span class="sec-label">01 / 数据源</span>
        <div class="seg" id="source-seg">
          <button data-source="0">Claude</button>
          <button data-source="1">Codex</button>
        </div>
        </div>
        <div class="ctl">
        <span class="sec-label">02 / 灯珠显示什么</span>
        <div class="seg" id="mode-seg">
          <button data-mode="0">额度</button>
          <button data-mode="1">今日消耗</button>
          <button data-mode="2">活动</button>
        </div>
        </div>
      </section>

      <section class="stats" id="stats"></section>

      <details class="settings">
        <summary>设置</summary>
        <label>
          Claude 日预算 (tokens)
          <input id="claude-budget" type="number" min="0" step="100000" />
        </label>
        <label>
          Codex 日预算 (tokens)
          <input id="codex-budget" type="number" min="0" step="100000" />
        </label>
        <label>
          周限额告警阈值 (%)
          <input id="warn-threshold" type="number" min="0" max="100" />
        </label>
        <label>
          额度模式指标
          <select id="quota-metric">
            <option value="0">5 小时优先</option>
            <option value="1">周限额优先</option>
            <option value="2">两者取大</option>
          </select>
        </label>
        <label>Claude 活动时灯亮这个颜色 <input id="claude-color" type="color" /></label>
        <label>Codex 活动时灯亮这个颜色 <input id="codex-color" type="color" /></label>
        <button id="save-config">保存</button>

        <div class="pro">
          <span class="sec-label">PRO 模式 — 需刷写键盘固件</span>
          <p class="pro-note">
            注意:「刷入 Pro 固件」会<b>改写键盘本体的固件</b>(不是升级本软件),
            用带 usage 灯效的开源 QMK 固件替换原厂固件,以解锁逐灯进度条、
            键盘按键切换、断线自愈。键位与宏会自动备份并写回,VIA 改键照常可用。
          </p>
          <div id="pro-status">检测中…</div>
          <div class="pro-row">
            <button id="backup-keymap">备份键位</button>
            <button id="upgrade-pro" disabled><span id="upgrade-label">刷入 Pro 固件</span><span class="beta">BETA</span></button>
            <button id="restore-stock" disabled>还原原厂固件</button>
          </div>
          <div id="pro-progress"></div>
        </div>
      </details>
    </main>
  </body>
</html>
