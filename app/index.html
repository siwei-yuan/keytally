<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QMK Usage Lights</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main>
      <div class="plate">
        <span class="plate-title">USAGE TELEMETRY</span>
        <span class="plate-sub">QMK-LINK // UNIT 01</span>
      </div>
      <div class="stripe"></div>
      <header>
        <span id="conn-dot" class="dot off"></span>
        <span id="conn-text">未连接键盘</span>
      </header>

      <section id="preview" aria-label="键盘灯组预览"></section>

      <div class="legend">
        <span><i class="chip grad"></i>灯色 = 用量 0→100%</span>
        <span><i class="chip" style="background:#e8641b"></i>源指示色(活动呼吸)</span>
        <span><i class="chip warn"></i>红闪 = 周限额超阈值</span>
      </div>

      <section class="controls">
        <div class="ctl">
        <span class="sec-label">数据源</span>
        <div class="seg" id="source-seg">
          <button data-source="0">Claude</button>
          <button data-source="1">Codex</button>
        </div>
        </div>
        <div class="ctl">
        <span class="sec-label">灯光显示指标 ▸ 选择灯珠亮什么</span>
        <div class="seg" id="mode-seg">
          <button data-mode="0">额度</button>
          <button data-mode="1">今日消耗</button>
          <button data-mode="2">活动</button>
        </div>
        </div>
      </section>

      <section class="stats" id="stats"></section>

      <details class="settings">
        <summary>设置</summary>
        <label>
          Claude 日预算 (tokens)
          <input id="claude-budget" type="number" min="0" step="100000" />
        </label>
        <label>
          Codex 日预算 (tokens)
          <input id="codex-budget" type="number" min="0" step="100000" />
        </label>
        <label>
          周限额告警阈值 (%)
          <input id="warn-threshold" type="number" min="0" max="100" />
        </label>
        <label>
          额度模式指标
          <select id="quota-metric">
            <option value="0">5 小时优先</option>
            <option value="1">周限额优先</option>
            <option value="2">两者取大</option>
          </select>
        </label>
        <label>Claude 源指示色(活动模式呼吸色/指示灯) <input id="claude-color" type="color" /></label>
        <label>Codex 源指示色(活动模式呼吸色/指示灯) <input id="codex-color" type="color" /></label>
        <button id="save-config">保存</button>
      </details>
    </main>
  </body>
</html>
